<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact — Creative Portfolio</title>
<link rel="icon" href="../assets/img/favicon.ico">

</head>
<body>

<header class="site-header">
  <a class="site-title" href="../">Creative Portfolio</a>
  <nav class="site-nav" id="siteNav">
    <a href="../">Home</a>
    <a href="../contact/">Contact</a>
  </nav>
  <button class="nav-toggle" id="navToggle" aria-label="Open menu">
    <span></span><span></span>
  </button>
</header>

<section class="page-intro theme-white contact-page">
<div class="page-copy">
<h1>Let's chat.</h1>
<p>If you need more than just content, campaign direction, structure, clarity — I’d love to chat.</p>
</div>
<form class="contact-form" action="https://formsubmit.co/Rania.inraraland@gmail.com" method="POST">
  <input type="hidden" name="_subject" value="Portfolio site enquiry">
  <input type="hidden" name="_captcha" value="false">
  <label>Name<input type="text" name="name" required></label>
  <label>Email<input type="email" name="email" required></label>
  <label>Message<textarea name="message" rows="6" required></textarea></label>
  <button type="submit" class="btn">Send</button>
</form>
</section>

<footer class="site-footer">
  <h3>Creative Portfolio</h3>
  <p>Contact me: <a href="mailto:Rania.inraraland@gmail.com">Rania.inraraland@gmail.com</a></p>
</footer>

</body>
</html>
